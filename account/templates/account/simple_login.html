<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 입력</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f4fbf8;
            font-family: 'Pretendard', sans-serif;
        }

        .login-box {
            width: 100%;
            max-width: 360px;
            background: #fff;
            border: 2px dashed #b8dfd1;
            border-radius: 28px;
            padding: 32px 28px;
            box-shadow: 0 12px 28px rgba(80, 140, 120, 0.08);
            text-align: center;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 28px;
            color: #2f6f60;
        }

        p {
            margin: 0 0 20px;
            color: #7a9188;
            font-size: 14px;
        }

        input[type="password"] {
            width: 100%;
            box-sizing: border-box;
            height: 48px;
            border: 2px solid #b8dfd1;
            border-radius: 16px;
            padding: 0 14px;
            font-size: 16px;
            outline: none;
            margin-bottom: 14px;
        }

        input[type="password"]:focus {
            border-color: #7cc9b1;
            box-shadow: 0 0 0 3px rgba(124, 201, 177, 0.12);
        }

        button {
            width: 100%;
            height: 48px;
            border: none;
            border-radius: 16px;
            background: #7cc9b1;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        button:hover {
            background: #69b79f;
        }

        .error {
            margin-top: 12px;
            color: #d87955;
            font-size: 14px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🌷 My Money</h1>
        <p>비밀번호를 입력해 주세요</p>

        <form method="post">
            {% csrf_token %}
            <input type="password" name="password" placeholder="비밀번호">
            <button type="submit">입장하기</button>
        </form>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
    </div>
</body>
</html>
